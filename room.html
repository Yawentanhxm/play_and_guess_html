<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你弹我猜 — 多人房间</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/room.css">
</head>
<body class="room-page">

<!-- Toast 容器 -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ① 入口 -->
<div id="entryView" class="room-card">
  <h1 class="room-title">🎹 你弹我猜</h1>
  <p class="room-subtitle">多人派对模式 · 你弹旋律，大家来猜！</p>

  <input class="room-input" id="nickInput" type="text" placeholder="输入你的昵称" maxlength="12">

  <button class="btn-room btn-create" id="createBtn">🎵 创建房间</button>

  <div class="room-divider">或者加入已有房间</div>

  <input class="room-input" id="codeInput" type="text" placeholder="输入 4 位房间码" maxlength="4"
         style="text-transform:uppercase;letter-spacing:4px;font-size:20px;text-align:center">
  <button class="btn-room btn-join" id="joinBtn">🚪 加入房间</button>

  <p class="room-error" id="entryError"></p>
</div>

<!-- ② 等待大厅 -->
<div id="lobbyView" class="lobby-view hidden">
  <div class="room-code-box" id="roomCodeBox" title="点击复制房间码">
    <div class="room-code-label">房间码（分享给朋友）</div>
    <div class="room-code-value" id="roomCodeDisplay">----</div>
    <div class="room-code-hint">点击复制</div>
  </div>

  <div class="members-list">
    <div class="members-title">👥 房间成员</div>
    <div id="membersList"></div>
  </div>

  <button class="btn-room btn-create hidden" id="startBtn">▶ 开始游戏</button>
  <p style="text-align:center;color:rgba(226,217,243,0.4);font-size:13px" id="lobbyHint">等待房主开始游戏...</p>
</div>

<!-- ③ 弹奏者视图 -->
<div id="performerView" class="game-view hidden">
  <div class="game-header">
    <div class="song-name-reveal" id="songNameDisplay">🎵 ——</div>
    <div class="countdown-bar-wrap">
      <div class="countdown-bar" id="countdownBar" style="width:100%"></div>
    </div>
    <div class="countdown-text" id="countdownText">50s</div>
  </div>

  <!-- 简谱 -->
  <div class="mp-sheet" id="performerSheet"></div>

  <!-- 三排键盘 -->
  <div class="mp-keyboard">
    <div class="keyboard-row octave-row-high">
      <span class="octave-label">高 ↑</span>
      <div class="key" data-note="1" data-octave="1"><span class="key-letter">Q</span><span class="key-note">1</span></div>
      <div class="key" data-note="2" data-octave="1"><span class="key-letter">W</span><span class="key-note">2</span></div>
      <div class="key" data-note="3" data-octave="1"><span class="key-letter">E</span><span class="key-note">3</span></div>
      <div class="key" data-note="4" data-octave="1"><span class="key-letter">R</span><span class="key-note">4</span></div>
      <div class="key" data-note="5" data-octave="1"><span class="key-letter">T</span><span class="key-note">5</span></div>
      <div class="key" data-note="6" data-octave="1"><span class="key-letter">Y</span><span class="key-note">6</span></div>
      <div class="key" data-note="7" data-octave="1"><span class="key-letter">U</span><span class="key-note">7</span></div>
    </div>
    <div class="keyboard-row octave-row-mid">
      <span class="octave-label">中</span>
      <div class="key" data-note="1" data-octave="0"><span class="key-letter">A</span><span class="key-note">1</span></div>
      <div class="key" data-note="2" data-octave="0"><span class="key-letter">S</span><span class="key-note">2</span></div>
      <div class="key" data-note="3" data-octave="0"><span class="key-letter">D</span><span class="key-note">3</span></div>
      <div class="key" data-note="4" data-octave="0"><span class="key-letter">F</span><span class="key-note">4</span></div>
      <div class="key" data-note="5" data-octave="0"><span class="key-letter">G</span><span class="key-note">5</span></div>
      <div class="key" data-note="6" data-octave="0"><span class="key-letter">H</span><span class="key-note">6</span></div>
      <div class="key" data-note="7" data-octave="0"><span class="key-letter">J</span><span class="key-note">7</span></div>
    </div>
    <div class="keyboard-row octave-row-low">
      <span class="octave-label">低 ↓</span>
      <div class="key" data-note="1" data-octave="-1"><span class="key-letter">Z</span><span class="key-note">1</span></div>
      <div class="key" data-note="2" data-octave="-1"><span class="key-letter">X</span><span class="key-note">2</span></div>
      <div class="key" data-note="3" data-octave="-1"><span class="key-letter">C</span><span class="key-note">3</span></div>
      <div class="key" data-note="4" data-octave="-1"><span class="key-letter">V</span><span class="key-note">4</span></div>
      <div class="key" data-note="5" data-octave="-1"><span class="key-letter">B</span><span class="key-note">5</span></div>
      <div class="key" data-note="6" data-octave="-1"><span class="key-letter">N</span><span class="key-note">6</span></div>
      <div class="key" data-note="7" data-octave="-1"><span class="key-letter">M</span><span class="key-note">7</span></div>
    </div>
  </div>

  <div style="text-align:center;color:rgba(226,217,243,0.5);font-size:13px" id="performerTip">按对应键弹奏旋律，让大家猜出这首歌！</div>
</div>

<!-- ④ 猜题者视图 -->
<div id="guesserView" class="game-view hidden">
  <div class="game-header">
    <div style="font-weight:700;font-size:16px">🎵 听旋律猜歌名</div>
    <div class="countdown-bar-wrap">
      <div class="countdown-bar" id="gCountdownBar" style="width:100%"></div>
    </div>
    <div class="countdown-text" id="gCountdownText">50s</div>
  </div>

  <!-- 实时简谱 -->
  <div class="mp-sheet" id="guesserSheet"></div>

  <!-- 三选一 -->
  <div class="guess-options" id="guessOptions"></div>

  <p style="text-align:center;color:rgba(226,217,243,0.4);font-size:13px;margin-top:4px" id="guesserTip">仔细听旋律，只有一次机会！</p>
</div>

<!-- ⑤ 结算页 -->
<div id="resultView" class="result-view hidden">
  <p class="result-title">🎉 本轮结束！正确答案是</p>
  <p class="result-answer" id="resultAnswer">——</p>

  <table class="score-table">
    <thead>
      <tr><th>名次</th><th>玩家</th><th>本轮得分</th><th>总分</th></tr>
    </thead>
    <tbody id="scoreTableBody"></tbody>
  </table>

  <button class="btn-room btn-create hidden" id="replayBtn">🔄 再来一轮</button>
  <p style="text-align:center;color:rgba(226,217,243,0.4);font-size:13px" id="resultHint">等待房主开始下一轮...</p>
</div>

<script src="js/tonejs-midi.js"></script>
<script src="js/audio.js"></script>
<script src="js/room.js"></script>
</body>
</html>
